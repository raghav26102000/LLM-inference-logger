apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: llm-logger
data:
  default.conf: |
    server {
        listen 3000;
        root /usr/share/nginx/html;
        index index.html;

        # Gzip for faster SPA load
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

        # Proxy all /api/* calls to the ingestion service
        # This is the key in k8s: "ingestion:4000" becomes "ingestion-svc:4000"
        location /api/ {
            proxy_pass         http://ingestion-svc:4000/api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE (Server-Sent Events) — disable buffering so events stream live
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;  # keep SSE connection alive for 1 hour
            chunked_transfer_encoding on;
        }

        # SPA fallback — all unknown routes serve index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache static assets aggressively (Vite adds content hashes)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
