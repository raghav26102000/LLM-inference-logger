apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: llm-logger
  labels:
    app: frontend
spec:
  replicas: 1          # overridden per-overlay
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # ── CHANGE THIS to your registry/image:tag ────────────────────────
          image: YOUR_REGISTRY/llm-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http

          # Mount the nginx config so /api/* proxies to ingestion-svc
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 15

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

      volumes:
        - name: nginx-config
          configMap:
            name: frontend-nginx-config
