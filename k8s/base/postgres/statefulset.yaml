apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: llm-logger
  labels:
    app: postgres
spec:
  serviceName: postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      # ── Security context: run as non-root (postgres uid=999) ─────────────
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsNonRoot: true

      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres

          env:
            - name: POSTGRES_DB
              value: inference_logs
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          # Mount the init SQL script to auto-create schema on first boot
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql

          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5

          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

      volumes:
        - name: init-sql
          configMap:
            name: postgres-init-sql

  # ── Persistent volume claim (created automatically by StatefulSet) ────────
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
        # storageClassName: standard   # uncomment and set for your cluster
---
# ConfigMap holding the init.sql content.
# Paste the full contents of scripts/init.sql here (or use kustomize configMapGenerator).
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
  namespace: llm-logger
data:
  # Paste contents of scripts/init.sql here.
  # Kustomize configMapGenerator (in kustomization.yaml) loads it automatically.
  init.sql: |
    -- placeholder: kustomize configMapGenerator replaces this
    SELECT 1;
