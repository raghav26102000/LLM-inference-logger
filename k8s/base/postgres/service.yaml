apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: llm-logger
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  # ClusterIP (not headless) — ingestion connects via postgres-svc:5432
  type: ClusterIP
