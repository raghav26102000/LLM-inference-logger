apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: llm-logger
  labels:
    app: ingestion
spec:
  replicas: 1          # overridden per-overlay
  selector:
    matchLabels:
      app: ingestion
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0   # zero-downtime rollouts
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      # ── Wait for Postgres to be reachable before starting ─────────────────
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-svc 5432; do
                echo "waiting for postgres..."; sleep 2
              done
              echo "postgres is up"
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis-svc 6379; do
                echo "waiting for redis..."; sleep 2
              done
              echo "redis is up"

      containers:
        - name: ingestion
          # ── CHANGE THIS to your registry/image:tag ────────────────────────
          image: YOUR_REGISTRY/llm-ingestion:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http

          # ── Non-secret config ─────────────────────────────────────────────
          envFrom:
            - configMapRef:
                name: ingestion-config

          # ── Secret values injected individually ───────────────────────────
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: POSTGRES_PASSWORD
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: OPENAI_API_KEY
                  optional: true
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: GROQ_API_KEY
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: GEMINI_API_KEY
                  optional: true
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: DEEPSEEK_API_KEY
                  optional: true

          # ── Health probes ─────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          # ── Resource requests/limits (overridden per-overlay) ─────────────
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
