apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: llm-logger

bases:
  - ../../base

# Dev: 1 replica for everything, no HPA
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: ingestion
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: frontend
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: redis

  # Relax resource limits in dev so it runs on a laptop
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
    target:
      kind: Deployment
      name: ingestion

# In dev, images are often loaded via `kind load` or `k3s ctr images import`
# so :latest with imagePullPolicy=Never avoids needing a registry
images:
  - name: YOUR_REGISTRY/llm-ingestion
    newTag: latest
  - name: YOUR_REGISTRY/llm-frontend
    newTag: latest
