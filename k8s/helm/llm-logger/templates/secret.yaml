apiVersion: v1
kind: Secret
metadata:
  name: llm-api-keys
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-logger.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | b64enc | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicKey | b64enc | quote }}
  OPENAI_API_KEY:    {{ .Values.secrets.openaiKey     | b64enc | quote }}
  GROQ_API_KEY:      {{ .Values.secrets.groqKey       | b64enc | quote }}
  GEMINI_API_KEY:    {{ .Values.secrets.geminiKey     | b64enc | quote }}
  DEEPSEEK_API_KEY:  {{ .Values.secrets.deepseekKey   | b64enc | quote }}
