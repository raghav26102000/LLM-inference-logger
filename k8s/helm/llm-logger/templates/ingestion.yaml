apiVersion: v1
kind: ConfigMap
metadata:
  name: ingestion-config
  namespace: {{ .Release.Namespace }}
data:
  PORT: "{{ .Values.ingestion.port }}"
  NODE_ENV: "production"
  REDIS_URL: "redis://redis-svc:6379"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: {{ .Release.Namespace }}
  labels:
    app: ingestion
    {{- include "llm-logger.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ingestion.replicas }}
  selector:
    matchLabels:
      app: ingestion
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z postgres-svc 5432; do echo waiting; sleep 2; done"]
        - name: wait-for-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redis-svc 6379; do echo waiting; sleep 2; done"]
      containers:
        - name: ingestion
          image: {{ .Values.ingestion.image.repository }}:{{ .Values.ingestion.image.tag }}
          imagePullPolicy: {{ .Values.ingestion.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.ingestion.port }}
          envFrom:
            - configMapRef:
                name: ingestion-config
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@postgres-svc:5432/inference_logs"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: POSTGRES_PASSWORD
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: OPENAI_API_KEY
                  optional: true
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: GROQ_API_KEY
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: GEMINI_API_KEY
                  optional: true
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-api-keys
                  key: DEEPSEEK_API_KEY
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ingestion.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ingestion.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.ingestion.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-svc
  namespace: {{ .Release.Namespace }}
  labels:
    app: ingestion
spec:
  selector:
    app: ingestion
  ports:
    - port: {{ .Values.ingestion.port }}
      targetPort: {{ .Values.ingestion.port }}
  type: ClusterIP
